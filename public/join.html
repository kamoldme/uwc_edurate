<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join as Teacher - EduRate</title>
  <link rel="icon" type="image/png" href="/e_logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1a2e1a 0%, #059669 50%, #1a2e1a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { width: 100%; max-width: 420px; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { color: #fff; font-size: 2.5rem; font-weight: 700; letter-spacing: -1px; }
    .logo h1 span { color: #10b981; }
    .logo p { color: #93c5fd; font-size: 0.9rem; margin-top: 8px; }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .card h2 { color: #1a2e1a; font-size: 1.5rem; margin-bottom: 8px; }
    .card p.subtitle { color: #64748b; font-size: 0.875rem; margin-bottom: 28px; }
    .org-badge {
      background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px;
      padding: 10px 14px; margin-bottom: 20px; display: none;
      color: #047857; font-size: 0.875rem; font-weight: 500;
    }
    .org-badge.show { display: block; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; color: #334155; font-size: 0.875rem; font-weight: 500; margin-bottom: 6px; }
    .form-group input, .form-group select {
      width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 10px;
      font-size: 0.95rem; font-family: inherit; transition: border-color 0.2s; outline: none;
      background: #fff;
    }
    .form-group input:focus, .form-group select:focus { border-color: #059669; box-shadow: 0 0 0 3px rgba(5,150,105,0.15); }
    .invite-input {
      text-transform: uppercase;
      font-family: monospace !important;
      font-size: 1.1rem !important;
      letter-spacing: 3px;
      text-align: center;
    }
    .hint { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }
    .btn {
      width: 100%; padding: 14px; background: #059669; color: #fff; border: none;
      border-radius: 10px; font-size: 1rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: background 0.2s;
    }
    .btn:hover { background: #047857; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #94a3b8; cursor: not-allowed; }
    .error-msg {
      background: #fef2f2; color: #dc2626; padding: 10px 14px; border-radius: 8px;
      font-size: 0.85rem; margin-bottom: 16px; display: none; border: 1px solid #fecaca;
    }
    .error-msg.show { display: block; }
    .success-msg {
      background: #f0fdf4; color: #16a34a; padding: 10px 14px; border-radius: 8px;
      font-size: 0.85rem; margin-bottom: 16px; display: none; border: 1px solid #bbf7d0;
    }
    .success-msg.show { display: block; }
    .links { text-align: center; margin-top: 20px; font-size: 0.875rem; color: #64748b; }
    .links a { color: #059669; text-decoration: none; font-weight: 500; }
    .links a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      body { padding: 16px; }
      .card { padding: 28px 24px; }
      .btn { min-height: 48px; }
      .form-group input, .form-group select { min-height: 48px; font-size: 16px !important; }
    }
    @media (max-width: 480px) {
      body { padding: 12px; }
      .container { max-width: 100%; }
      .card { padding: 24px 18px; border-radius: 14px; }
      .card h2 { font-size: 1.2rem; }
      .logo h1 { font-size: 2rem; }
      .links { font-size: 0.8rem; }
      .form-group { margin-bottom: 14px; }
    }
    @media (max-width: 375px) {
      .card { padding: 20px 16px; }
      .logo h1 { font-size: 1.75rem; }
      .form-group input, .form-group select { padding: 10px 14px; }
    }
    @supports (padding: env(safe-area-inset-bottom)) {
      body {
        padding-bottom: calc(20px + env(safe-area-inset-bottom));
        padding-top: calc(20px + env(safe-area-inset-top));
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px">
        <img src="/e_logo.png" alt="EduRate Logo" style="width:48px;height:48px">
        <h1 style="margin:0">Edu<span>Rate</span></h1>
      </div>
      <p>Teacher Registration</p>
    </div>
    <div class="card">
      <div id="error" class="error-msg"></div>
      <div id="success" class="success-msg"></div>

      <h2>Join as a Teacher</h2>
      <p class="subtitle">Enter your details and the invite code from your administrator</p>

      <div id="orgBadge" class="org-badge"></div>

      <form id="joinForm">
        <div class="form-group">
          <label for="invite_code">Invite Code</label>
          <input type="text" id="invite_code" class="invite-input" placeholder="XXXXXXXX" maxlength="8" required autocomplete="off" spellcheck="false">
          <p class="hint">8-character code provided by your administrator</p>
        </div>
        <div class="form-group">
          <label for="full_name">Full Name</label>
          <input type="text" id="full_name" placeholder="Your full name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password">
          <p class="hint">Must include uppercase, lowercase, and a number</p>
        </div>
        <div class="form-group" id="deptGroup" style="display:none">
          <label for="dept_select">Department <span style="color:#dc2626">*</span></label>
          <select id="dept_select">
            <option value="">— Choose a department —</option>
          </select>
        </div>
        <button type="submit" class="btn" id="joinBtn">Create Account</button>
      </form>

      <div class="links">
        Already have an account? <a href="/login">Sign in</a> | <a href="/">Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    let orgDepartments = [];

    function clearMessages() {
      document.getElementById('error').className = 'error-msg';
      document.getElementById('success').className = 'success-msg';
    }
    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg; el.className = 'error-msg show';
    }
    function showSuccess(msg) {
      const el = document.getElementById('success');
      el.textContent = msg; el.className = 'success-msg show';
    }

    // Auto-fetch org info when invite code is complete
    let inviteLookupTimer = null;
    document.getElementById('invite_code').addEventListener('input', function() {
      this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 8);
      clearTimeout(inviteLookupTimer);
      const code = this.value;
      if (code.length === 8) {
        inviteLookupTimer = setTimeout(() => fetchOrgInfo(code), 300);
      } else {
        clearOrgInfo();
      }
    });

    async function fetchOrgInfo(code) {
      try {
        const res = await fetch('/api/auth/invite-info?invite_code=' + encodeURIComponent(code));
        if (!res.ok) { clearOrgInfo(); return; }
        const data = await res.json();
        orgDepartments = data.departments || [];
        document.getElementById('orgBadge').textContent = 'Organization: ' + data.org_name;
        document.getElementById('orgBadge').className = 'org-badge show';
        const deptGroup = document.getElementById('deptGroup');
        const sel = document.getElementById('dept_select');
        if (orgDepartments.length > 0) {
          sel.innerHTML = '<option value="">— Choose a department —</option>' +
            orgDepartments.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
          deptGroup.style.display = '';
        } else {
          deptGroup.style.display = 'none';
        }
      } catch { clearOrgInfo(); }
    }

    function clearOrgInfo() {
      orgDepartments = [];
      document.getElementById('orgBadge').className = 'org-badge';
      document.getElementById('deptGroup').style.display = 'none';
    }

    document.getElementById('joinForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();

      const invite_code = document.getElementById('invite_code').value.trim();
      if (invite_code.length !== 8) {
        showError('Invite code must be 8 characters');
        return;
      }

      const deptSel = document.getElementById('dept_select');
      if (orgDepartments.length > 0 && !deptSel.value) {
        showError('Please select your department');
        return;
      }

      const btn = document.getElementById('joinBtn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      const payload = {
        full_name: document.getElementById('full_name').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        invite_code
      };
      if (orgDepartments.length > 0 && deptSel.value) {
        payload.department_id = parseInt(deptSel.value);
      }

      try {
        const res = await fetch('/api/auth/register-teacher', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data.error);
          btn.disabled = false;
          btn.textContent = 'Create Account';
          return;
        }
        showSuccess('Account created! Redirecting to your dashboard...');
        setTimeout(() => { window.location.href = '/app'; }, 1000);
      } catch {
        showError('Connection error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });

    if (localStorage.getItem('edurate_token')) {
      fetch('/api/auth/me', {
        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('edurate_token') },
        credentials: 'include'
      }).then(r => { if (r.ok) window.location.href = '/app'; });
    }
  </script>
</body>
</html>
