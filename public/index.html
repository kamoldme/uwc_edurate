<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oasis – Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23059669'/><text x='16' y='22' font-size='18' font-weight='bold' fill='white' text-anchor='middle' font-family='sans-serif'>O</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #0069AA; --blue-dark: #004f82;
      --navy: #002d52; --navy-deep: #001830;
      --red: #BE1E2D;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--navy-deep);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container { width: 100%; max-width: 420px; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { color: #fff; font-size: 2.5rem; font-weight: 700; letter-spacing: -1px; }
    .logo h1 span { color: var(--blue); }
    .logo p { color: rgba(255,255,255,0.55); font-size: 0.9rem; margin-top: 8px; }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--red) 0%, var(--blue) 100%);
    }
    .card h2 {
      font-family: 'Playfair Display', Georgia, serif;
      color: var(--navy-deep);
      font-size: 1.6rem;
      margin-bottom: 8px;
    }
    .card p.subtitle { color: #64748b; font-size: 0.875rem; margin-bottom: 28px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; color: #334155; font-size: 0.875rem; font-weight: 500; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 10px;
      font-size: 0.95rem; font-family: inherit; transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    .form-group input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,105,170,0.12); }
    .btn {
      width: 100%; padding: 14px; background: var(--blue); color: #fff; border: none;
      border-radius: 10px; font-size: 1rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    .btn:hover { background: var(--blue-dark); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #94a3b8; cursor: not-allowed; }
    .error-msg {
      background: #fef2f2; color: #dc2626; padding: 10px 14px; border-radius: 8px;
      font-size: 0.85rem; margin-bottom: 16px; display: none; border: 1px solid #fecaca;
    }
    .error-msg.show { display: block; }
    .links { text-align: center; margin-top: 20px; font-size: 0.875rem; color: #64748b; }
    .links a { color: var(--blue); text-decoration: none; font-weight: 500; }
    .links a:hover { text-decoration: underline; }
    .secure-badge { text-align: center; margin-top: 24px; color: rgba(255,255,255,0.4); font-size: 0.75rem; }
    .secure-badge svg { width: 14px; height: 14px; vertical-align: middle; margin-right: 4px; }

    @media (max-width: 768px) {
      body { padding: 16px; }
      .card { padding: 28px 24px; }
      .card h2 { font-size: 1.3rem; }
      .btn { min-height: 48px; }
      .form-group input { min-height: 48px; font-size: 16px !important; }
    }
    @media (max-width: 480px) {
      body { padding: 12px; }
      .login-container { max-width: 100%; }
      .card { padding: 24px 18px; border-radius: 14px; }
      .card h2 { font-size: 1.2rem; }
      .card p.subtitle { font-size: 0.82rem; margin-bottom: 20px; }
      .logo h1 { font-size: 2rem; }
      .logo p { font-size: 0.82rem; }
      .links { font-size: 0.8rem; }
      .secure-badge { font-size: 0.7rem; }
    }
    @media (max-width: 375px) {
      .card { padding: 20px 16px; }
      .logo h1 { font-size: 1.75rem; }
      .form-group input { padding: 10px 14px; }
    }
    @supports (padding: env(safe-area-inset-bottom)) {
      body {
        padding-bottom: calc(20px + env(safe-area-inset-bottom));
        padding-top: calc(20px + env(safe-area-inset-top));
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;background:#059669;border-radius:12px;font-size:24px;font-weight:700;color:#fff;font-family:sans-serif">O</span>
        <h1 style="margin:0">Oasis</h1>
      </div>
      <p>Secure Teacher Feedback Platform</p>
    </div>
    <div class="card">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in with your school email to continue</p>
      <div id="error" class="error-msg"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">School Email</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn" id="loginBtn">Sign In</button>
      </form>
      <div class="links">
        Need an account? Contact your school administrator.
      </div>
    </div>
    <div class="secure-badge">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
      Private school platform — Verified access only
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('error');
      errorEl.className = 'error-msg';

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });

        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error;
          errorEl.className = 'error-msg show';
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }

        // Store token as backup
        localStorage.setItem('oasis_token', data.token);
        localStorage.setItem('oasis_user', JSON.stringify(data.user));
        window.location.href = '/app';
      } catch (err) {
        errorEl.textContent = 'Connection error. Please try again.';
        errorEl.className = 'error-msg show';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    // Redirect if already logged in
    if (localStorage.getItem('oasis_token')) {
      fetch('/api/auth/me', {
        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('oasis_token') },
        credentials: 'include'
      }).then(r => { if (r.ok) window.location.href = '/app'; });
    }
  </script>
</body>
</html>
